<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>International Hall | Gallery</title>
  <script>
    (function () {
      try {
        if (localStorage.getItem("dc-hostel-theme") === "dark") {
          document.documentElement.classList.add("dark");
          document.documentElement.dataset.theme = "dark";
        }
      } catch (error) {}
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700;800&family=Noto+Serif+Bengali:wght@400;500;600;700&family=Outfit:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="gallery">
  <header class="navbar" id="navbar">
    <div class="container nav-inner">
      <a class="logo" href="index.html" aria-label="International Hall home">
        <img class="logo-img" src="images/logo.png" alt="International Hall logo" loading="lazy">
        <span data-i18n="nav.logo">International Hall</span>
      </a>
      <nav class="nav-links" aria-label="Primary navigation">
        <a href="index.html" data-i18n="nav.home">Home</a>
        <a href="students.html" data-i18n="nav.students">Students</a>
        <a href="roommates.html" data-i18n="nav.roommates">Roommates</a>
        <a href="results.html" data-i18n="nav.results">Results</a>
        <a href="hostel.html" data-i18n="nav.hostel">Hall Info</a>
      </nav>
      <div class="nav-actions">
        <div class="language-switch" aria-label="Language selector">
          <button type="button" data-lang-option="en">English</button>
          <button type="button" data-lang-option="bn">বাংলা</button>
        </div>
        <button class="theme-toggle" id="toggle" type="button" aria-label="Toggle dark mode">
          <span aria-hidden="true">&#9789;</span>
        </button>
      </div>
    </div>
  </header>

  <main class="page-main">
    <section class="page-hero compact">
      <div class="container" data-aos="fade-up">
        <p class="eyebrow" data-i18n="nav.gallery">Gallery</p>
        <h1 data-i18n="gallery.title">Hall Gallery</h1>
        <p data-i18n="gallery.subtitle">Event photos, group moments and student activities. Replace these demo files later with real photos.</p>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <div class="gallery-grid">
          <!-- Dynamic CMS items rendered by js/app.js -->
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container footer-inner"></div>
  </footer>

  <div class="modal" id="studentModal" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="modalName">
    <div class="modal-backdrop" data-close-modal></div>
    <article class="modal-panel">
      <button class="modal-close" type="button" aria-label="Close gallery preview" data-close-modal>&times;</button>
      <div id="modalContent"></div>
    </article>
  </div>

  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script src="js/netlify-identity.js"></script>
  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
