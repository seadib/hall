<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DC Hostel | Roommates</title>
  <script>
    (function () {
      try {
        if (localStorage.getItem("dc-hostel-theme") === "dark") {
          document.documentElement.classList.add("dark");
          document.documentElement.dataset.theme = "dark";
        }
      } catch (error) {}
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700;800&family=Noto+Serif+Bengali:wght@400;500;600;700&family=Outfit:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="roommates">
  <header class="navbar" id="navbar">
    <div class="container nav-inner">
      <a class="logo" href="index.html" aria-label="DC Hostel home">
        <img class="logo-img" src="images/logo.png" alt="International Hall logo" loading="lazy">
        <span data-i18n="nav.logo">International Hall</span>
      </a>
      <nav class="nav-links" aria-label="Primary navigation">
        <a href="index.html" data-i18n="nav.home">Home</a>
        <a href="students.html" data-i18n="nav.students">Students</a>
        <a href="roommates.html" class="active" data-i18n="nav.roommates">Roommates</a>
        <a href="results.html" data-i18n="nav.results">Results</a>
        <a href="hostel.html" data-i18n="nav.hostel">Hostel Info</a>
      </nav>
      <div class="nav-actions">
        <div class="language-switch" aria-label="Language selector">
          <button type="button" data-lang-option="en">English</button>
          <button type="button" data-lang-option="bn">বাংলা</button>
        </div>
        <button class="theme-toggle" id="toggle" type="button" aria-label="Toggle dark mode">
          <span aria-hidden="true">&#9789;</span>
        </button>
      </div>
    </div>
  </header>

  <main class="page-main">
    <section class="page-hero roommates-hero compact">
      <div class="container" data-aos="fade-up">
        <p class="eyebrow" data-i18n="common.rooms">Rooms</p>
        <h1 data-i18n="roommates.title">Roommate Assignments</h1>
        <p data-i18n="roommates.subtitle">Room-based student pairs with quick profile access.</p>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <div class="filter-panel" data-aos="fade-up">
          <label>
            <span data-i18n="filters.class">Class</span>
            <select id="filterClass">
              <option value="" data-i18n="filters.allClasses">All Classes</option>
              <option value="11" data-i18n="studentClass.11">Class XI</option>
              <option value="12" data-i18n="studentClass.12">Class XII</option>
            </select>
          </label>
          <label>
            <span data-i18n="filters.group">Group</span>
            <select id="filterGroup">
              <option value="" data-i18n="filters.allGroups">All Groups</option>
              <option value="science" data-i18n="groups.science">Science</option>
              <option value="commerce" data-i18n="groups.commerce">Business Studies</option>
              <option value="arts" data-i18n="groups.arts">Humanities</option>
            </select>
          </label>
          <label>
            <span data-i18n="filters.section">Section</span>
            <select id="filterSection">
              <option value="" data-i18n="filters.allSections">All Sections</option>
              <option value="A">A</option>
              <option value="B">B</option>
              <option value="C">C</option>
              <option value="D">D</option>
              <option value="E">E</option>
            </select>
          </label>
          <label>
            <span data-i18n="filters.blood">Blood Group</span>
            <select id="filterBlood">
              <option value="" data-i18n="filters.allBlood">All Blood Groups</option>
              <option value="A+">A+</option>
              <option value="A-">A-</option>
              <option value="B+">B+</option>
              <option value="B-">B-</option>
              <option value="O+">O+</option>
              <option value="O-">O-</option>
              <option value="AB+">AB+</option>
              <option value="AB-">AB-</option>
            </select>
          </label>
        </div>
        <div class="search-wrap" data-aos="fade-up">
          <label for="roommateSearch" class="sr-only" data-i18n="common.searchStudents">Search students</label>
          <input id="roommateSearch" class="search-input" type="search" placeholder="Search by name, room, roll, blood group or address" data-i18n-placeholder="common.searchPlaceholderFull">
        </div>
        <div class="roommate-grid wide" id="roommateGrid"></div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container footer-inner">
      <p data-i18n="footer.demo">&copy; 2026 DC Hostel. Student information demo.</p>
      <p data-i18n="footer.credits">Photo credits: Wikimedia Commons CC BY-SA 4.0; demo portraits from Random User.</p>
    </div>
  </footer>

  <div class="modal" id="studentModal" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="modalName">
    <div class="modal-backdrop" data-close-modal></div>
    <article class="modal-panel">
      <button class="modal-close" type="button" aria-label="Close student profile" data-close-modal>&times;</button>
      <div id="modalContent"></div>
    </article>
  </div>

  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
